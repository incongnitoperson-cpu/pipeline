name: Update Markets

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run market fetcher
        run: python fetch_markets.py

      - name: Commit updated data
        run: |
          git config --global user.name "market-bot"
          git config --global user.email "actions@github.com"
          git add data/*.json
          git commit -m "update market data" || echo "no changes"
          git push
